apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: vanilla-class
spec:
  controller: ingress.k8s.aws/alb
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: vanilla-ns
  name: vanilla-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: vanilla-class
  rules:
  - host: app.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: svc-api
            port:
              number: 80
      - path: /web
        pathType: Prefix
        backend:
          service:
            name: svc-web
            port:
              number: 80
